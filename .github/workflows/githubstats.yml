name: Generate GitHub stats images

on:
  schedule:
    - cron: "0 4 * * *"   # se regenera cada día a las 04:00 UTC
  workflow_dispatch:        # también se puede lanzar a mano desde la pestaña Actions

jobs:
  generate-images:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: jstrieb/github-stats@master
        with:
          username: ManuelEspinosaSanz
          github_token: ${{ secrets.GITHUB_TOKEN }}
          exclude_repos: ""
          exclude_langs: ""
